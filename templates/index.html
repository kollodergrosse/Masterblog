<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>

    <div style="margin-bottom: 20px; max-width: 600px;">
        <a href="/add" style="background-color: #28a745; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; display: inline-block; font-family: sans-serif; font-size: 0.9em;">
            + Add Post
        </a>
    </div>

    <ul>
        {% for post in posts %}
        <div class="post" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; max-width: 600px;">

            <li style="list-style-type: none; margin: 0;">
                <h2>{{ post.title }}</h2>
                <p><em>Written by {{post.author}}</em> </p>
                <p>{{post.content}}</p>
            </li>

            <div class="post-actions" style="display: flex; gap: 10px; align-items: center; flex-shrink: 0;">

                <a href="/update/{{ post.id }}" style="background-color: #007bff; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.85em; font-weight: bold; display: inline-block; font-family: sans-serif;">
                    Update
                </a>

                <form action="/delete/{{ post.id }}" method="POST" style="margin: 0;">
                    <button type="submit" style="background-color: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold;">
                        Delete
                    </button>
                </form>

            </div>

        </div>
        {% endfor %}
    </ul>

</body>
</html>
