<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Blog Post</title>
</head>
<body>
    <h1>Update Blog Post</h1>

    <form method="POST" style="max-width: 400px; display: flex; flex-direction: column; gap: 10px;">

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" value="{{ post['author'] }}"><br>

        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ post['title'] }}"><br>

        <label for="content">Content:</label>
        <input type="text" id="content" name="content" value="{{ post['content'] }}"><br>

        <input type="submit" value="Update">
    </form>

</body>
</html>
